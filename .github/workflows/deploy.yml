name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: porter-setup

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          ACR_NAME=$(cat bicep/main.bicepparam | grep 'acrName' | sed "s/.*= '\\(.*\\)'/\\1/")
          az acr login --name $ACR_NAME
          docker build \
            -t $ACR_NAME.azurecr.io/porter:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/porter:latest \
            .
          docker push $ACR_NAME.azurecr.io/porter:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/porter:latest

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters bicep/main.bicepparam \
            --parameters \
              nextauthSecret=${{ secrets.NEXTAUTH_SECRET }} \
              dbAdminPassword=${{ secrets.DB_ADMIN_PASSWORD }} \
              azureAdClientSecret=${{ secrets.AZURE_AD_CLIENT_SECRET }} \
              googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              seedAdminEmail=${{ vars.SEED_ADMIN_EMAIL }} \
              containerTag=${{ github.sha }}

      - name: Restart App Service
        run: |
          APP_SERVICE_NAME=$(cat bicep/main.bicepparam | grep 'appServiceName' | sed "s/.*= '\\(.*\\)'/\\1/")
          az webapp restart \
            --name $APP_SERVICE_NAME \
            --resource-group ${{ env.RESOURCE_GROUP }}
