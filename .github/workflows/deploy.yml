name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: portercontainerregistry
  RESOURCE_GROUP: porter-setup
  APP_SERVICE_NAME: porter

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/porter:${{ github.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/porter:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/porter:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/porter:latest

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file bicep/main.bicep \
            --parameters \
              appServiceName=${{ env.APP_SERVICE_NAME }} \
              acrName=${{ env.ACR_NAME }} \
              location=${{ vars.AZURE_LOCATION }} \
              storageAccountName=${{ vars.STORAGE_ACCOUNT_NAME }} \
              storageContainerName=porter-uploads \
              databaseUrl=${{ secrets.DATABASE_URL }} \
              nextauthUrl=${{ vars.NEXTAUTH_URL }} \
              nextauthSecret=${{ secrets.NEXTAUTH_SECRET }} \
              azureAdClientId=${{ vars.AZURE_AD_CLIENT_ID }} \
              azureAdClientSecret=${{ secrets.AZURE_AD_CLIENT_SECRET }} \
              azureAdTenantId=${{ vars.AZURE_AD_TENANT_ID }} \
              googleClientId=${{ vars.GOOGLE_CLIENT_ID }} \
              googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              containerTag=${{ github.sha }}

      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ env.APP_SERVICE_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
